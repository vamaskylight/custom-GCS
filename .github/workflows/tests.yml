name: tests

# CI gate for VGCS / DOOAF. Runs the pytest suite on every push and PR.
#
# NOTE: the `tests/` directory is currently gitignored — untrack it (remove the tests entry
# from .gitignore and commit the suite) for this workflow to actually run the tests. Until
# then this file documents the intended gate.

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # PySide6 (Qt) is imported by the map/observation mixins; run headless.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system libs for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libgl1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest tests/ -q
